<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <defs>
    <linearGradient id="g" x1="10" y1="10" x2="110" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38E07A"/>
      <stop offset="100%" stop-color="#08B4C2"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="120" height="130"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)" transform="rotate(-32 60 65)">
    <!-- Outer shape -->
    <rect x="6" y="4" width="94" height="112" rx="22" stroke="url(#g)" stroke-width="10" fill="none"/>
    <!-- Second -->
    <rect x="20" y="20" width="68" height="82" rx="16" stroke="url(#g)" stroke-width="8.5" fill="none"/>
    <!-- Third -->
    <rect x="34" y="36" width="42" height="52" rx="11" stroke="url(#g)" stroke-width="7" fill="none"/>
    <!-- Inner -->
    <rect x="48" y="52" width="16" height="22" rx="6" stroke="url(#g)" stroke-width="5.5" fill="none"/>
  </g>
</svg>
